<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mayy luvvv💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    color: white;
}

/* OPENING */
.opening {
    position: fixed;
    width: 90%;
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.cake {
    font-size: 100px;
    cursor: pointer;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-15px); }
}

.hide {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* MAIN */
.main {
    display: none;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

/* FILM */
.film-wrapper {
    overflow: hidden;
    margin-top: 90px;
}

.film-track {
    display: flex;
    gap: 25px;
    width: max-content;
    transform: rotate(-8deg);
    animation: scroll 22s linear infinite;
}

/* FRAME AESTHETIC */
.frame {
    width: 100px;
    height: 200px;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    box-shadow:
        0 20px 40px rgba(0,0,0,0.5),
        inset 0 0 15px rgba(255,255,255,0.1);
    transition: transform 0.4s ease;
}

.frame:hover {
    transform: scale(1.08);
}

.frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
}

/* glow */
.frame::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    box-shadow: inset 0 0 25px rgba(255,255,255,0.15);
}

/* perforation atas */
.frame::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 10px;
    right: 10px;
    height: 6px;
    background: repeating-linear-gradient(
        to right,
        rgba(255,255,255,0.9) 0px,
        rgba(255,255,255,0.9) 6px,
        transparent 6px,
        transparent 12px
    );
}

/* perforation bawah */
.frame span {
    position: absolute;
    bottom: 8px;
    left: 10px;
    right: 10px;
    height: 6px;
    background: repeating-linear-gradient(
        to right,
        rgba(255,255,255,0.9) 0px,
        rgba(255,255,255,0.9) 6px,
        transparent 6px,
        transparent 12px
    );
}

/* LOOP */
@keyframes scroll {
    0% { transform: translateX(0) rotate(-8deg); }
    100% { transform: translateX(-50%) rotate(-8deg); }
}

/* TEXT */
.text {
    margin: 40px auto;
    max-width: 320px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 16px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- OPEN -->
<div class="opening" id="opening">
    <div class="cake" onclick="start()">🎂</div>
    <p>klik kuenya yaa 🫶</p>

</div>
</div>

<div class="text">
selamat ulang tahun yaa 🎂 <br><br>

<audio id="music" loop>
<source src="Stephen Sanchez - Until I Found You (Official Video).mp3" type="audio/mpeg">
</audio>

<script>
function start() {
    const music = document.getElementById("music");

    document.getElementById("opening").classList.add("hide");
    document.getElementById("main").style.display = "block";

    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

function heartRain() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💗";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
}

setInterval(heartRain, 400);
</script>
